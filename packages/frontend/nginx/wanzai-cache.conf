# ============================================================
# 焰境·万载 — Nginx 缓存策略（include 于 server 块内）
#
# 设计原则：
#   HTML / version.json → no-cache（确保部署后用户拿到最新 JS/CSS 引用）
#   哈希资源             → immutable + 1y（content hash 保证唯一）
#   非哈希静态资源       → 7d（favicon、firework 音效等变更不频繁）
# ============================================================

# HTML + version.json — 始终向服务器验证
location ~* \.(html|json)$ {
    root /usr/share/nginx/html/dist;
    add_header Cache-Control "no-cache";
}

# Vite 构建的哈希资源 — 永久缓存（文件名变了就是新文件）
location ~* "^/assets/.+-[a-zA-Z0-9_-]+\\.(js|css|png|jpg|jpeg|gif|svg|ico|webp|mp3|mp4|woff2?|ttf|webmanifest)$" {
    root /usr/share/nginx/html/dist;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# 非哈希静态文件 — 短期缓存
location ~* \.(svg|ico|txt|xml|pdf|webmanifest)$ {
    root /usr/share/nginx/html/dist;
    add_header Cache-Control "public, max-age=604800";
}

# firework 音效等 public 目录下的静态媒体 — 短期缓存
location /firework/ {
    root /usr/share/nginx/html/dist;
    add_header Cache-Control "public, max-age=604800";
}
