# ============================================================
# 焰境·万载 — Nginx 缓存策略
#
# 设计原则：
#   HTML          → no-cache（每次验证，确保部署后用户拿到最新 JS/CSS 引用）
#   哈希资源       → immutable + 1y（Vite 构建的 JS/CSS/图片/音频都带 content hash）
#   非哈希静态资源 → 1d（favicon、robots.txt、sitemap.xml 等变更不频繁的文件）
#   烟花音效      → 1d（public/firework/audio/ 无哈希，预留短期缓存）
# ============================================================

# HTML + version.json — 始终向服务器验证是否有新版本
location ~* \.(html|json)$ {
    add_header Cache-Control "no-cache";
    expires -1;
}

# Vite 构建产出的哈希资源 — 文件名中的哈希保证内容唯一，永久缓存
# 匹配如: /assets/index-9DwOiNM0.js, /assets/one_place_wanzai-DuSE_ByH.mp3
location ~* ^/assets/.*-[a-zA-Z0-9_-]{8,}\.(js|css|png|jpg|jpeg|gif|svg|ico|webp|mp3|mp4|woff2?|ttf|webmanifest)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires 1y;
}

# 非哈希静态文件 — 短期缓存（favicon、robots、sitemap、firework 音效等）
location ~* \.(svg|ico|txt|xml|pdf|json|webmanifest)$ {
    add_header Cache-Control "public, max-age=86400";
    expires 1d;
}

# 烟花音效 / 其他 public 目录下的静态媒体
location /firework/ {
    add_header Cache-Control "public, max-age=86400";
    expires 1d;
}
