name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: 构建并部署
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: 挂载 Turborepo 缓存
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: 生成 Prisma 客户端
        run: pnpm --filter @wanzai/backend exec prisma generate

      - name: Turborepo 全栈构建
        run: pnpm build --cache-dir=".turbo"
        env:
          VITE_AMAP_KEY: ${{ secrets.VITE_AMAP_KEY }}
          VITE_AMAP_SECURITY_CODE: ${{ secrets.VITE_AMAP_SECURITY_CODE }}

      - name: 准备后端部署包
        run: |
          cd packages/backend
          mkdir -p deploy
          cp -r dist deploy/
          cp -r prisma deploy/
          # 移除 workspace 协议依赖，contracts 是纯类型，运行时不需要
          sed 's/"@wanzai\/contracts": "workspace:\*",//' package.json > deploy/package.json

      - name: 设置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 部署前端到 Nginx
        run: |
          rsync -avz --delete \
            packages/frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/usr/share/nginx/html/dist/

      - name: 部署 Nginx 缓存策略
        run: |
          rsync -avz \
            packages/frontend/nginx/wanzai-cache.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/usr/share/nginx/wanzai-cache.conf

          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            sudo nginx -t && sudo nginx -s reload && echo "Nginx 缓存策略已重载"
          '

      - name: 部署后端并重启
        run: |
          # 逐目录 rsync，避免 --delete 误删 .env 和 node_modules
          rsync -avz --delete \
            packages/backend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/usr/share/nginx/wanzai-backend/dist/

          rsync -avz --delete \
            packages/backend/prisma/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/usr/share/nginx/wanzai-backend/prisma/

          rsync -avz \
            packages/backend/deploy/package.json \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/usr/share/nginx/wanzai-backend/package.json

          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            grep -q "^ADMIN_PHONES=" /usr/share/nginx/wanzai-backend/.env 2>/dev/null || \
              echo "ADMIN_PHONES=${{ secrets.ADMIN_PHONES }}" >> /usr/share/nginx/wanzai-backend/.env
          '

          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            cd /usr/share/nginx/wanzai-backend && \
            npm install --prod 2>&1 && \
            npx prisma generate && \
            npx prisma migrate deploy && \
            pm2 describe wanzai-backend >/dev/null 2>&1 && \
              pm2 reload wanzai-backend || \
              pm2 start dist/main.js --name wanzai-backend && \
            pm2 save
          '

      - name: 健康检查
        run: |
          sleep 3
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            echo "前端: $(curl -sf -o /dev/null -w "%{http_code}" http://localhost/)"
            echo "后端: $(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/)"
          '
