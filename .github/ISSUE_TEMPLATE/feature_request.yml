name: 功能建议
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出新想法！提交前请确认是否有[已有 Issue](https://github.com/nathanpenny520/WhizzZest/issues) 与此类似。

  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 清晰简洁地描述当前的问题或不足
      placeholder: 每次需要...时都很不方便...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 描述你希望看到的功能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否有其他方案可以实现同样的目标？

  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围
      multiple: true
      options:
        - 前端 UI
        - 烟花引擎
        - AI 花傩
        - 后端 API
        - 数据库
        - 国际化
        - SEO
        - PWA
        - CI/CD
        - 文档
        - 合约层 (@wanzai/contracts)
        - 其他

  - type: dropdown
    id: phase
    attributes:
      label: 所属重构阶段
      description: 此功能对应哪个重构阶段？（参见 CLAUDE.md 路线图）
      options:
        - Phase 2 — 花傩 AI IP 全站化
        - Phase 3 — 用户体系 + 数字烟花工坊
        - Phase 4 — 商户生态 + 商业闭环
        - Phase 5 — 页面架构 + SEO/PWA
        - Phase 6 — 中长期扩展
        - 不确定

  - type: checkboxes
    id: willing
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意自己实现这个功能并提交 PR
