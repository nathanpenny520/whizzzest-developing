name: Bug 报告
description: 报告一个 Bug，帮助我们改进项目
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告 Bug！提交前请先搜索是否已有[相关 Issue](https://github.com/nathanpenny520/WhizzZest/issues)。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个 Bug
      placeholder: 描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 访问 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 发现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图/录屏
      description: 如有相关截图或录屏，请拖放至此

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 前端 UI
        - 烟花效果
        - AI 问答
        - 后端 API
        - 数据库
        - 国际化
        - SEO
        - PWA
        - CI/CD
        - 文档
        - 其他

  - type: dropdown
    id: browser
    attributes:
      label: 浏览器
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - 其他

  - type: dropdown
    id: device
    attributes:
      label: 设备
      options:
        - 桌面端
        - 移动端
        - 平板

  - type: input
    id: version
    attributes:
      label: 版本
      description: 你在哪个版本上发现了这个问题？
      placeholder: 如 v2.0.0
